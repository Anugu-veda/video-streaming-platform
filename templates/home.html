<!DOCTYPE html>
<html>
<head>
    <title>VedaFlix</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav>
    <h1>VEDAFLIX</h1>
    <h3>Welcome,{{session['user']}}</h3>
    <a href="/logout">Logout</a>

    <div>
        <a href="/upload"><button>Upload</button></a>
        <a href="/login"><button>Login</button></a>
        <a href="/signup"><button>Sign Up</button></a>
    </div>
</nav>

<div class="hero">
    <h2>Unlimited Videos, Entertainment & Learning</h2>
    <p>Watch anywhere. Upload anytime.</p>
</div>

<h2 class="section-title">Trending Videos</h2>

<div class="video-grid">

{% for video in videos %}

<div class="video-card">

    <video controls>
        <source src="/uploads/{{ video[1] }}">
    </video>

    <h3>{{ video[1] }}</h3>

</div>

{% endfor %}

</div>

</body>
</html>
